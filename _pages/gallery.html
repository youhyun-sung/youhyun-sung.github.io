<div class="yh-gallery">
  {% assign groups = "1,2,3,4,5,6,7,8" | split: "," %}
  {% for g in groups %}
    <button type="button" class="yh-gallery-item" data-group="{{ g }}" aria-label="Open gallery {{ g }}">
      <img src="/images/gallery/g{{ g }}.1.jpg" alt="gallery {{ g }}" loading="lazy">
    </button>
  {% endfor %}
</div>

<div class="yh-modal" id="yh-modal" style="display:none;" role="dialog" aria-modal="true" aria-labelledby="yh-modal-title">
  <div class="yh-modal-backdrop" id="yh-modal-backdrop"></div>
  <div class="yh-modal-card" role="document">
    <button class="yh-modal-close" id="yh-modal-close" aria-label="Close">×</button>
    <div class="yh-modal-media">
      <button class="yh-modal-nav yh-modal-prev" id="yh-modal-prev" aria-label="Previous">‹</button>
      <img class="yh-modal-img" id="yh-modal-img" alt="">
      <button class="yh-modal-nav yh-modal-next" id="yh-modal-next" aria-label="Next">›</button>
      <div class="yh-modal-dots" id="yh-modal-dots"></div>
    </div>
    <aside class="yh-modal-side">
      <h3 class="yh-modal-title" id="yh-modal-title"></h3>
      <p class="yh-modal-desc" id="yh-modal-desc"></p>
      <div class="yh-modal-counter" id="yh-modal-counter"></div>
    </aside>
  </div>
</div>

<style>
  .yh-gallery {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 20px;
    margin: 24px 0 48px;
  }
  .yh-gallery-item {
    padding: 0;
    border: 0;
    background: #eee;
    cursor: pointer;
    overflow: hidden;
    border-radius: 10px;
    box-shadow: 0 3px 14px rgba(0,0,0,0.1);
    aspect-ratio: 3 / 4;
    transition: transform 180ms ease, box-shadow 180ms ease;
  }
  .yh-gallery-item:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.18);
  }
  .yh-gallery-item img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  /* ====== Instagram-style modal ====== */
  .yh-modal {
    position: fixed;
    inset: 0;
    z-index: 9999;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .yh-modal-backdrop {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.75);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
  }
  .yh-modal-card {
    position: relative;
    display: grid;
    grid-template-columns: minmax(0, 1fr) 340px;
    background: #fff;
    border-radius: 14px;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    max-width: min(1100px, 96vw);
    width: 100%;
    max-height: 88vh;
    animation: yh-modal-in 180ms ease;
  }
  @keyframes yh-modal-in {
    from { opacity: 0; transform: translateY(12px) scale(0.98); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }
  .yh-modal-close {
    position: absolute;
    top: 10px;
    right: 10px;
    z-index: 5;
    width: 36px;
    height: 36px;
    border: 0;
    border-radius: 50%;
    background: rgba(0,0,0,0.6);
    color: #fff;
    font-size: 22px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .yh-modal-close:hover { background: rgba(0,0,0,0.85); }

  .yh-modal-media {
    position: relative;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 420px;
  }
  .yh-modal-img {
    max-width: 100%;
    max-height: 88vh;
    width: auto;
    height: auto;
    min-width: 320px;
    object-fit: contain;
    display: block;
  }
  .yh-modal-nav {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 40px;
    height: 40px;
    border: 0;
    border-radius: 50%;
    background: rgba(255,255,255,0.85);
    color: #222;
    font-size: 26px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 2px 6px rgba(0,0,0,0.3);
  }
  .yh-modal-nav:hover { background: #fff; }
  .yh-modal-prev { left: 12px; }
  .yh-modal-next { right: 12px; }

  .yh-modal-dots {
    position: absolute;
    bottom: 14px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 6px;
  }
  .yh-modal-dots span {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: rgba(255,255,255,0.5);
    transition: background 150ms ease, transform 150ms ease;
  }
  .yh-modal-dots span.on {
    background: #fff;
    transform: scale(1.2);
  }

  .yh-modal-side {
    padding: 24px 22px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 12px;
    border-left: 1px solid #eee;
  }
  .yh-modal-title {
    margin: 0;
    font-size: 1.25rem;
    font-weight: 700;
  }
  .yh-modal-desc {
    margin: 0;
    line-height: 1.6;
    color: #444;
    white-space: pre-wrap;
  }
  .yh-modal-counter {
    margin-top: auto;
    color: #888;
    font-size: 0.85rem;
  }

  @media (max-width: 820px) {
    .yh-modal-card {
      grid-template-columns: 1fr;
      grid-template-rows: auto auto;
      max-height: 92vh;
    }
    .yh-modal-media { min-height: 0; aspect-ratio: 4/5; }
    .yh-modal-img { max-height: 60vh; }
    .yh-modal-side { border-left: 0; border-top: 1px solid #eee; }
  }
</style>

<script>
(function() {
  var data = JSON.parse(document.getElementById('yh-gallery-data').textContent);
  var byGroup = {};
  data.forEach(function(d) { byGroup[d.group] = d; });
  var GROUP_SIZE = 3;

  var modal = document.getElementById('yh-modal');
  var imgEl = document.getElementById('yh-modal-img');
  var titleEl = document.getElementById('yh-modal-title');
  var descEl = document.getElementById('yh-modal-desc');
  var counterEl = document.getElementById('yh-modal-counter');
  var dotsEl = document.getElementById('yh-modal-dots');
  var current = { group: null, index: 1 };

  function render() {
    var g = current.group, i = current.index;
    var meta = byGroup[g] || { title: '', description: '' };
    imgEl.src = '/images/gallery/g' + g + '.' + i + '.jpg';
    imgEl.alt = meta.title || ('gallery ' + g);
    titleEl.textContent = meta.title || '';
    descEl.textContent = meta.description || '';
    counterEl.textContent = i + ' / ' + GROUP_SIZE;
    dotsEl.innerHTML = '';
    for (var k = 1; k <= GROUP_SIZE; k++) {
      var dot = document.createElement('span');
      if (k === i) dot.className = 'on';
      dotsEl.appendChild(dot);
    }
  }

  function open(group, index) {
    current.group = group;
    current.index = ((index - 1 + GROUP_SIZE) % GROUP_SIZE) + 1;
    render();
    modal.style.display = 'flex';
    document.body.style.overflow = 'hidden';
  }
  function close() {
    modal.style.display = 'none';
    document.body.style.overflow = '';
  }
  function step(delta) {
    current.index = ((current.index - 1 + delta + GROUP_SIZE) % GROUP_SIZE) + 1;
    render();
  }
  function isOpen() { return modal.style.display === 'flex'; }

  document.querySelectorAll('.yh-gallery-item').forEach(function(btn) {
    btn.addEventListener('click', function() { open(btn.dataset.group, 1); });
  });
  document.getElementById('yh-modal-close').addEventListener('click', close);
  document.getElementById('yh-modal-backdrop').addEventListener('click', close);
  document.getElementById('yh-modal-prev').addEventListener('click', function() { step(-1); });
  document.getElementById('yh-modal-next').addEventListener('click', function() { step(1); });

  document.addEventListener('keydown', function(e) {
    if (!isOpen()) return;
    if (e.key === 'Escape') close();
    else if (e.key === 'ArrowLeft') step(-1);
    else if (e.key === 'ArrowRight') step(1);
  });
})();
</script>
